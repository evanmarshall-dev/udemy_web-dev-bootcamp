<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get vs Post Requests</title>
  </head>
  <body>
    <!-- We can receive data using both get and post and express allows us to treat them differently. -->
    <h1>GET vs POST Requests</h1>
    <h2>GET</h2>
    <form action="http://localhost:3000/tacos" method="get">
      <input type="text" name="meat" />
      <input type="number" name="qty" />
      <button type="submit">Submit</button>
    </form>

    <h2>POST</h2>
    <form action="http://localhost:3000/tacos" method="post">
      <input type="text" name="meat" />
      <input type="number" name="qty" />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
