<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Events - Prevent Default</title>
  </head>
  <body>
    <h1>Form Events - Prevent Default</h1>
    <!-- Whatever data is in the form gets submitted to the action location. -->
    <!-- Also, the location in action is also the page the browser ends up which is the DEFAULT BEHAVIOUR for forms. -->
    <form action="/shelter" id="shelterForm">
      <input type="text" name="" id="" />
      <button type="submit">Submit</button>
    </form>
    <script src="./preventdefault-formevents.js"></script>
  </body>
</html>
