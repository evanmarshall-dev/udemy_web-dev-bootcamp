<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Basics</title>
  </head>
  <body>
    <h1>Event Basics</h1>
    <!-- #1. First way to run on click event is inline (not recommended). -->
    <!-- Issues with this method is with the quotes as well as being able to run multiple lines of JavaScript. Also, if you want the same functionality on another button you need to copy and paste the code from the first button. Copying and pasting could lead to a lot of redundant code/logic. -->
    <button onclick="alert('This method is dumb')">Click Me!</button>

    <!-- #2. For the second method. -->
    <button id="v2">Click Me, Too!</button>

    <!-- #3. For the second method. -->
    <button id="v3">Click Me, Three!</button>
    <button id="tas">TWIST &amp; SHOUT</button>

    <script src="./event-basics.js"></script>
  </body>
</html>
